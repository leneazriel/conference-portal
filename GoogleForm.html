<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mid-Year Pastoral Conference Portal</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f9fafb;
      text-align: center;
      padding: 40px;
      color: #333;
    }

    h1 {
      margin-bottom: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .container {
      max-width: 600px;
      margin: auto;
    }

    .card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 18px 22px;
      margin: 12px 0;
      border-radius: 14px;
      text-decoration: none;
      color: #333;
      border: 1px solid #e5e7eb;
      transition: all 0.3s ease;
    }

    /* HOVER EFFECT */
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      background: #f3f4f6;
    }

    .card span:last-child {
      font-size: 14px;
      color: #9ca3af;
      transition: 0.3s;
    }

    .card:hover span:last-child {
      color: #2563eb;
    }
  </style>
</head>

<body>

<h1>Mid-Year Pastoral Conference 2026 Portal</h1>

</html>
